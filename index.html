<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نادي الجيش المركزي الرياضي — تسجيل الأنشطة الصيفية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Amiri:wght@700&display=swap" rel="stylesheet">
<style>
  :root{
    --green-deep:#122b22;
    --green:#1c4433;
    --green-soft:#e8efe9;
    --gold:#c8a13c;
    --gold-light:#e9d9a8;
    --cream:#f6f2e7;
    --ink:#1a2420;
    --muted:#5c6b62;
    --danger:#a13c3c;
    --radius:14px;
    --shadow:0 10px 30px rgba(18,43,34,.12);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--cream);
    color:var(--ink);
    font-family:'Tajawal',sans-serif;
    line-height:1.6;
  }
  .hero{
    background:linear-gradient(160deg,var(--green-deep),var(--green) 70%);
    color:#fff;
    padding:48px 20px 64px;
    text-align:center;
    position:relative;
    overflow:hidden;
  }
  .hero::after{
    content:"";
    position:absolute;inset:0;
    background:repeating-linear-gradient(45deg,rgba(200,161,60,.05) 0 2px,transparent 2px 40px);
    pointer-events:none;
  }
  .hero .stars{color:var(--gold);letter-spacing:6px;font-size:14px;margin-bottom:10px;}
  .hero h1{
    font-family:'Amiri',serif;
    font-size:clamp(26px,4vw,40px);
    margin:0 0 8px;
  }
  .hero p{color:var(--gold-light);margin:0;font-size:15px;}
  .hero .badge{
    display:inline-block;margin-top:18px;background:var(--gold);color:var(--green-deep);
    font-weight:700;padding:8px 22px;border-radius:999px;font-size:13px;
  }
  .wrap{max-width:820px;margin:-36px auto 60px;padding:0 16px;}
  .card{
    background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);
    padding:26px 24px;margin-bottom:20px;border:1px solid #eee3c8;
  }
  .card h2{
    font-size:18px;margin:0 0 18px;color:var(--green-deep);
    display:flex;align-items:center;gap:10px;
  }
  .card h2 .num{
    background:var(--green-deep);color:var(--gold);width:28px;height:28px;border-radius:8px;
    display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;
  }
  label{display:block;font-size:14px;font-weight:500;margin:14px 0 6px;color:var(--green-deep);}
  label.req::after{content:" *";color:var(--danger);}
  input[type=text],input[type=tel],textarea,select{
    width:100%;padding:11px 13px;border:1.5px solid #ddd3ae;border-radius:10px;
    font-family:inherit;font-size:15px;background:#fdfcf7;color:var(--ink);
    transition:border-color .15s;
  }
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--gold);}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media(max-width:560px){.row{grid-template-columns:1fr;}}
  .hint{font-size:12.5px;color:var(--muted);margin-top:4px;}
  .radio-group,.check-group{display:flex;flex-wrap:wrap;gap:10px;margin-top:6px;}
  .pill{
    border:1.5px solid #ddd3ae;border-radius:10px;padding:10px 14px;cursor:pointer;
    font-size:14px;background:#fdfcf7;user-select:none;transition:.15s;
  }
  .pill input{display:none;}
  .pill.active{background:var(--green-deep);border-color:var(--green-deep);color:#fff;}
  .pill.active .gold{color:var(--gold);}
  .child-card{
    border:1.5px dashed var(--gold);border-radius:var(--radius);padding:18px;margin-bottom:16px;
    background:linear-gradient(180deg,#fffdf6,#fbf6e6);position:relative;
  }
  .child-card .child-title{font-weight:700;color:var(--green-deep);margin-bottom:4px;font-size:15px;}
  .remove-child{
    position:absolute;left:14px;top:14px;background:none;border:none;color:var(--danger);
    font-size:13px;cursor:pointer;font-family:inherit;
  }
  .activity-block{
    border:1px solid #e6dcb8;border-radius:10px;padding:12px 14px;margin-top:10px;background:#fff;
  }
  .activity-block .a-title{font-weight:700;font-size:14px;color:var(--green-deep);margin-bottom:8px;}
  .sub-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
  .add-child-btn,.submit-btn{
    display:block;width:100%;padding:14px;border:none;border-radius:12px;font-family:inherit;
    font-size:15px;font-weight:700;cursor:pointer;transition:.15s;
  }
  .add-child-btn{background:var(--green-soft);color:var(--green-deep);border:1.5px dashed var(--green);margin-top:6px;}
  .add-child-btn:hover{background:#dcecdf;}
  .submit-btn{background:var(--gold);color:var(--green-deep);font-size:17px;margin-top:8px;}
  .submit-btn:hover{background:#b78f2f;}
  .submit-btn:disabled{opacity:.6;cursor:not-allowed;}
  .status-msg{text-align:center;padding:14px;border-radius:10px;margin-top:14px;font-weight:600;display:none;}
  .status-msg.ok{background:#e4f3e7;color:#1c6b34;display:block;}
  .status-msg.err{background:#fbe6e6;color:var(--danger);display:block;}
  .footer-note{text-align:center;color:var(--muted);font-size:12.5px;padding:0 20px 30px;}
  fieldset{border:none;padding:0;margin:0;}
</style>
</head>
<body>

<div class="hero">
  <div class="stars">★ ★ ★</div>
  <h1>نادي الجيش المركزي الرياضي</h1>
  <p>نموذج تسجيل الأنشطة الرياضية الصيفية — خاص بالأخوة العسكريين</p>
  <div class="badge">دمشق — استراد الفيحاء</div>
</div>

<div class="wrap">
  <form id="regForm">

    <div class="card">
      <h2><span class="num">1</span> بيانات ولي الأمر</h2>

      <label class="req">الاسم الكامل</label>
      <input type="text" id="parentName" required>

      <div class="row">
        <div>
          <label class="req">رقم الهاتف (واتساب)</label>
          <input type="tel" id="phone" required placeholder="09xxxxxxxx">
        </div>
        <div>
          <label class="req">الصفة</label>
          <div class="radio-group" id="militaryStatusGroup">
            <label class="pill"><input type="radio" name="mstatus" value="ضابط">ضابط</label>
            <label class="pill"><input type="radio" name="mstatus" value="فرد">فرد</label>
          </div>
        </div>
      </div>

      <label>رقم الهوية العسكرية / الجهة التابع لها</label>
      <input type="text" id="militaryId" placeholder="سيُطلب إبرازها عند الحضور">
      <div class="hint">يُستخدم فقط للتحقق من استحقاق الرسوم الرمزية، ولا يُشارك خارج إدارة المركز.</div>

      <label class="req">الحي / المنطقة السكنية</label>
      <input type="text" id="neighborhood" required placeholder="مثال: المزة، دمر، الفيحاء...">

      <label>العنوان التفصيلي (أقرب نقطة مواصلات معروفة)</label>
      <textarea id="address" rows="2" placeholder="يساعدنا على تجميع الأطفال القريبين من بعضهم لتنظيم خط النقل"></textarea>
    </div>

    <div class="card">
      <h2><span class="num">2</span> بيانات الأطفال</h2>
      <div id="childrenContainer"></div>
      <button type="button" class="add-child-btn" id="addChildBtn">+ إضافة طفل</button>
    </div>

    <div class="card">
      <label>ملاحظات إضافية</label>
      <textarea id="notes" rows="2" placeholder="أي معلومة إضافية تود إخبارنا بها"></textarea>
      <button type="submit" class="submit-btn" id="submitBtn">إرسال التسجيل</button>
      <div class="status-msg" id="statusMsg"></div>
    </div>
  </form>
</div>

<div class="footer-note">
  للاستفسار: 0114429512 / 0114475635 — مكتب الاستعلامات بالفيحاء
</div>

<script>
// ============== إعدادات ==============
const CONFIG = {
  // ضع هنا رابط تطبيق الويب (Web App URL) بعد نشر كود Apps Script — راجع ملف التعليمات المرفق
  SCRIPT_URL: "https://script.google.com/macros/s/AKfycbxTN-vYQg3Jupnjgd_3Gj8kZaZJ8MD50rdgg8uH4c49HJx2swsvlJEbwbe6CLQJ56Rt/exec"
};

// تعريف النشاطات: كل نشاط له مجموعات (أيام) وفترات (صباحي/مسائي) حسب الجداول المرفقة
const ACTIVITIES = {
  football: {
    label: "⚽ كرة القدم",
    groups: [
      {id:"g1", label:"المجموعة الأولى (أحد - ثلاثاء - خميس)"},
      {id:"g2", label:"المجموعة الثانية (سبت - اثنين - أربعاء)"}
    ],
    periods: [
      {id:"morning", label:"صباحي 9:00 - 10:30"},
      {id:"evening", label:"مسائي 5:30 - 7:00"}
    ]
  },
  basketball: {
    label: "🏀 كرة السلة",
    groups: [
      {id:"g1", label:"المجموعة الأولى (أحد - ثلاثاء - خميس)"},
      {id:"g2", label:"المجموعة الثانية (سبت - اثنين - أربعاء)"}
    ],
    periods: [
      {id:"morning", label:"صباحي 10:30 - 12:00"},
      {id:"evening", label:"مسائي 5:30 - 7:00"}
    ]
  },
  swimming: {
    label: "🏊 مدرسة السباحة",
    groups: [
      {id:"g1", label:"المجموعة الأولى (أحد - ثلاثاء - خميس)"},
      {id:"g2", label:"المجموعة الثانية (سبت - اثنين - أربعاء)"}
    ],
    periods: [], // يُحدد تلقائياً حسب جنس الطفل
    genderPeriods:{
      male:[{id:"morning",label:"صباحاً 8:30 - 10:00"},{id:"evening",label:"مساءً 6:00 - 7:30"}],
      female:[{id:"morning",label:"صباحاً 10:00 - 11:30"},{id:"evening",label:"مساءً 5:30 - 7:00"}]
    }
  },
  badminton: {
    label: "🏸 مدرسة الريشة",
    groups: [{id:"all", label:"سبت - اثنين - أربعاء - خميس"}],
    periods: [{id:"morning", label:"صباحاً 10:30 - 12:00 (فقط)"}]
  },
  karate: {
    label: "🥋 كاراتيه",
    groups: [{id:"g", label:"سبت - اثنين - أربعاء"}],
    periods: [{id:"morning",label:"صباحاً 10:30 - 12:00"},{id:"evening",label:"مساءً 4:30 - 6:00"}]
  },
  wrestling: {
    label: "🤼 مصارعة",
    groups: [{id:"g", label:"أحد - ثلاثاء - خميس"}],
    periods: [{id:"morning",label:"صباحاً 10:30 - 12:00"},{id:"evening",label:"مساءً 4:30 - 6:00"}]
  },
  judo: {
    label: "🥋 جودو",
    groups: [{id:"g", label:"سبت - اثنين - أربعاء"}],
    periods: [{id:"morning",label:"صباحاً 10:30 - 12:00"},{id:"evening",label:"مساءً 4:30 - 6:00"}]
  }
};

let childCount = 0;
const container = document.getElementById('childrenContainer');

function addChild(){
  childCount++;
  const id = childCount;
  const div = document.createElement('div');
  div.className = 'child-card';
  div.dataset.childId = id;
  div.innerHTML = `
    <button type="button" class="remove-child" onclick="removeChild(${id})">✕ إزالة</button>
    <div class="child-title">الطفل رقم ${id}</div>
    <div class="row">
      <div>
        <label class="req">اسم الطفل</label>
        <input type="text" class="c-name" required>
      </div>
      <div>
        <label class="req">العمر</label>
        <input type="text" class="c-age" required placeholder="مثال: 8">
      </div>
    </div>
    <label class="req">الجنس</label>
    <div class="radio-group gender-group">
      <label class="pill"><input type="radio" name="gender-${id}" value="ذكر" checked>ذكر</label>
      <label class="pill"><input type="radio" name="gender-${id}" value="أنثى">أنثى</label>
    </div>

    <label class="req">نوع التسجيل</label>
    <div class="radio-group type-group">
      <label class="pill active"><input type="radio" name="type-${id}" value="camp" checked>المعسكر الصيفي المتكامل</label>
      <label class="pill"><input type="radio" name="type-${id}" value="activities">نشاطات رياضية منفصلة</label>
    </div>

    <div class="camp-info hint">🏕️ للأعمار 5-9 سنوات — دوام يومي 8:00 صباحاً - 2:00 ظهراً، ويشمل نقل من المناطق القريبة.</div>

    <div class="activities-picker" style="display:none;">
      <label>اختر نشاطاً أو أكثر</label>
      <div class="check-group activity-checks"></div>
      <div class="activity-details"></div>
    </div>
  `;
  container.appendChild(div);
  initChildCard(div, id);
}

function removeChild(id){
  const el = container.querySelector(`[data-child-id="${id}"]`);
  if(el) el.remove();
}

function initChildCard(div, id){
  // pill toggle for gender & type
  div.querySelectorAll('.radio-group').forEach(group=>{
    group.querySelectorAll('.pill').forEach(pill=>{
      pill.addEventListener('click', ()=>{
        group.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
        pill.classList.add('active');
      });
    });
  });

  const typeInputs = div.querySelectorAll(`input[name="type-${id}"]`);
  const campInfo = div.querySelector('.camp-info');
  const actPicker = div.querySelector('.activities-picker');
  const actChecks = div.querySelector('.activity-checks');
  const actDetails = div.querySelector('.activity-details');

  // build activity checkboxes
  Object.entries(ACTIVITIES).forEach(([key, act])=>{
    const lbl = document.createElement('label');
    lbl.className = 'pill';
    lbl.innerHTML = `<input type="checkbox" class="act-check" value="${key}"> ${act.label}`;
    lbl.querySelector('input').addEventListener('change', (e)=>{
      lbl.classList.toggle('active', e.target.checked);
      renderActivityDetails();
    });
    actChecks.appendChild(lbl);
  });

  function getGenderVal(){
    return div.querySelector(`input[name="gender-${id}"]:checked`).value === 'ذكر' ? 'male' : 'female';
  }

  function renderActivityDetails(){
    actDetails.innerHTML = '';
    const checked = [...actChecks.querySelectorAll('.act-check:checked')].map(c=>c.value);
    checked.forEach(key=>{
      const act = ACTIVITIES[key];
      const block = document.createElement('div');
      block.className = 'activity-block';
      block.dataset.actKey = key;
      let periods = act.periods;
      if(key === 'swimming'){ periods = act.genderPeriods[getGenderVal()]; }

      block.innerHTML = `
        <div class="a-title">${act.label}</div>
        ${act.groups.length>1 ? `<div>الأيام:</div><div class="sub-row group-row"></div>` : `<div class="hint">الأيام: ${act.groups[0].label}</div>`}
        <div style="margin-top:8px;">الفترة:</div>
        <div class="sub-row period-row"></div>
      `;
      if(act.groups.length>1){
        const gRow = block.querySelector('.group-row');
        act.groups.forEach((g,i)=>{
          const p = document.createElement('label');
          p.className = 'pill' + (i===0?' active':'');
          p.innerHTML = `<input type="radio" name="grp-${id}-${key}" value="${g.id}" ${i===0?'checked':''}> ${g.label}`;
          p.querySelector('input').addEventListener('change',()=>{
            gRow.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));
            p.classList.add('active');
          });
          gRow.appendChild(p);
        });
      }
      const pRow = block.querySelector('.period-row');
      periods.forEach((pr,i)=>{
        const p = document.createElement('label');
        p.className = 'pill' + (i===0?' active':'');
        p.innerHTML = `<input type="radio" name="per-${id}-${key}" value="${pr.id}" data-label="${pr.label}" ${i===0?'checked':''}> ${pr.label}`;
        p.querySelector('input').addEventListener('change',()=>{
          pRow.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));
          p.classList.add('active');
        });
        pRow.appendChild(p);
      });
      actDetails.appendChild(block);
    });
  }

  typeInputs.forEach(inp=>{
    inp.addEventListener('change', ()=>{
      if(inp.value==='camp' && inp.checked){
        campInfo.style.display='block';
        actPicker.style.display='none';
      } else if(inp.value==='activities' && inp.checked){
        campInfo.style.display='none';
        actPicker.style.display='block';
      }
    });
  });

  div.querySelectorAll(`input[name="gender-${id}"]`).forEach(g=>{
    g.addEventListener('change', renderActivityDetails);
  });
}

document.getElementById('addChildBtn').addEventListener('click', addChild);
addChild(); // طفل واحد افتراضياً

// pill toggle for parent status
document.querySelectorAll('#militaryStatusGroup .pill').forEach(pill=>{
  pill.addEventListener('click',()=>{
    document.querySelectorAll('#militaryStatusGroup .pill').forEach(p=>p.classList.remove('active'));
    pill.classList.add('active');
  });
});

// ============== إرسال البيانات ==============
document.getElementById('regForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const statusMsg = document.getElementById('statusMsg');
  statusMsg.className='status-msg'; statusMsg.style.display='none';

  const parentName = document.getElementById('parentName').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const mstatusInput = document.querySelector('input[name="mstatus"]:checked');
  const militaryId = document.getElementById('militaryId').value.trim();
  const neighborhood = document.getElementById('neighborhood').value.trim();
  const address = document.getElementById('address').value.trim();
  const notes = document.getElementById('notes').value.trim();

  if(!parentName || !phone || !neighborhood){
    statusMsg.textContent='الرجاء تعبئة الحقول الإلزامية (الاسم، الهاتف، الحي).';
    statusMsg.className='status-msg err';
    return;
  }

  const childCards = [...container.querySelectorAll('.child-card')];
  if(childCards.length===0){
    statusMsg.textContent='الرجاء إضافة طفل واحد على الأقل.';
    statusMsg.className='status-msg err';
    return;
  }

  const rows = [];
  let valid = true;

  childCards.forEach(card=>{
    const cid = card.dataset.childId;
    const cname = card.querySelector('.c-name').value.trim();
    const cage = card.querySelector('.c-age').value.trim();
    const gender = card.querySelector(`input[name="gender-${cid}"]:checked`).value;
    const type = card.querySelector(`input[name="type-${cid}"]:checked`).value;
    if(!cname || !cage){ valid=false; return; }

    const base = {parentName,phone,militaryStatus:mstatusInput?mstatusInput.value:'',militaryId,neighborhood,address,notes,childName:cname,childGender:gender,childAge:cage};

    if(type==='camp'){
      rows.push({...base, registrationType:'معسكر صيفي', activityName:'المعسكر الصيفي المتكامل', group:'يومي', period:'8:00ص - 2:00م'});
    } else {
      const blocks = card.querySelectorAll('.activity-block');
      if(blocks.length===0){ valid=false; return; }
      blocks.forEach(block=>{
        const key = block.dataset.actKey;
        const actLabel = ACTIVITIES[key].label;
        const grpInput = block.querySelector('input[type=radio][name^="grp-"]:checked');
        const perInput = block.querySelector('input[type=radio][name^="per-"]:checked');
        rows.push({...base, registrationType:'نشاط منفصل', activityName:actLabel,
          group: grpInput ? grpInput.parentElement.textContent.trim() : ACTIVITIES[key].groups[0].label,
          period: perInput ? perInput.dataset.label : ''});
      });
    }
  });

  if(!valid || rows.length===0){
    statusMsg.textContent='الرجاء إكمال بيانات كل طفل واختيار نشاط واحد على الأقل.';
    statusMsg.className='status-msg err';
    return;
  }

  if(CONFIG.SCRIPT_URL.includes('PASTE_YOUR')){
    statusMsg.textContent='⚠️ لم يتم ربط النموذج بعد بقاعدة البيانات (SCRIPT_URL). راجع ملف التعليمات.';
    statusMsg.className='status-msg err';
    return;
  }

  btn.disabled = true; btn.textContent='جاري الإرسال...';
  try{
    // ملاحظة: نستخدم no-cors لأن Google Apps Script لا يعيد ترويسات CORS القياسية
    // عبر إعادة التوجيه الداخلية لديه؛ هذا يمنع خطأ "Failed to fetch" في المتصفح.
    // الأثر الجانبي: لا يمكننا قراءة رد الخادم للتأكد من النجاح، لذا نتحقق يدوياً لاحقاً من الشيت.
    await fetch(CONFIG.SCRIPT_URL, {
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify(rows)
    });
    statusMsg.textContent = `✅ تم إرسال بيانات ${rows.length} تسجيل. سنتواصل معكم لتأكيد التسجيل والنقل.`;
    statusMsg.className='status-msg ok';
    e.target.reset();
    container.innerHTML=''; childCount=0; addChild();
    document.querySelectorAll('.pill.active').forEach(p=>{
      if(!p.querySelector('input[name="type-1"]')) p.classList.remove('active');
    });
  }catch(err){
    statusMsg.textContent='تعذّر الاتصال بالخادم (تحقق من اتصالك بالإنترنت). يرجى المحاولة مجدداً أو التواصل هاتفياً.';
    statusMsg.className='status-msg err';
  }
  btn.disabled=false; btn.textContent='إرسال التسجيل';
});
</script>
</body>
</html>
